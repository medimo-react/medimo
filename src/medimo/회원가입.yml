info:
  name: 회원가입
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:5000/api/login
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
